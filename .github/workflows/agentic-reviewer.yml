name: Agentic Reviewer

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number being reviewed"
        type: string
        required: true
      pr_number:
        description: "PR number to review"
        type: string
        required: true
      review_cycle:
        description: "Current review cycle"
        type: string
        required: true
        default: "0"
      max_review_cycles:
        description: "Max review cycles"
        type: string
        required: false
        default: "3"
      project_node_id:
        description: "Project node ID"
        type: string
        required: false
        default: ""
      item_node_id:
        description: "Project item node ID"
        type: string
        required: false
        default: ""
      runner:
        description: "Runner label"
        type: string
        required: false
        default: "self-hosted"

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  review:
    uses: loacher-solution/.github/.github/workflows/reviewer.yml@main
    with:
      issue_number: ${{ inputs.issue_number }}
      pr_number: ${{ inputs.pr_number }}
      review_cycle: ${{ inputs.review_cycle }}
      max_review_cycles: ${{ inputs.max_review_cycles }}
      project_node_id: ${{ inputs.project_node_id }}
      item_node_id: ${{ inputs.item_node_id }}
      runner: ${{ inputs.runner }}
    secrets: inherit
